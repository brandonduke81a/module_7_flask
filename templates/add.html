<!DOCTYPE html>
<html>
<head>
    <title>Add / Edit Student</title>
</head>
<body>

<h1>{{ "Edit Student" if student else "Add Student" }}</h1>

<form method="POST">

    <label>First Name:</label><br>
    <input type="text" name="first_name" value="{{ student.first_name if student else '' }}" required><br><br>

    <label>Last Name:</label><br>
    <input type="text" name="last_name" value="{{ student.last_name if student else '' }}" required><br><br>

    <label>Student ID:</label><br>
    <input type="text" name="student_id" value="{{ student.student_id if student else '' }}" required><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" value="{{ student.email if student else '' }}" required><br><br>

    <label>Course Section:</label><br>
    <input type="text" name="course_section" value="{{ student.course_section if student else '' }}" required><br><br>

    <label>Semester:</label><br>
    <input type="text" name="semester" value="{{ student.semester if student else '' }}" required><br><br>

    <button type="submit">Save</button>

</form>

<br>
<a href="/items">Back to Student Records</a>

</body>
</html>
