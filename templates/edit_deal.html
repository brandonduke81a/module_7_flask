<!DOCTYPE html>
<html>
<head>
    <title>Edit Deal</title>
</head>

<body>

    <h1>Edit Deal</h1>

    <form method="POST">

        <label>Property Name:</label><br>
        <input type="text" name="property_name" value="{{ deal.property_name }}" required><br><br>

        <label>Gross Potential Rent:</label><br>
        <input type="number" step="0.01" name="gross_potential_rent" value="{{ deal.gross_potential_rent }}" required><br><br>

        <label>Vacancy Rate (%):</label><br>
        <input type="number" step="0.01" name="vacancy_rate" value="{{ '{:.2f}'.format(deal.vacancy_rate * 100) }}" required><br><br>

        <label>Operating Expenses:</label><br>
        <input type="number" step="0.01" name="operating_expenses" value="{{ deal.operating_expenses }}" required><br><br>

        <label>Annual Debt Service:</label><br>
        <input type="number" step="0.01" name="annual_debt_service" value="{{ deal.annual_debt_service }}" required><br><br>

        <label>Total Project Cost:</label><br>
        <input type="number" step="0.01" name="total_project_cost" value="{{ deal.total_project_cost }}" required><br><br>

        <button type="submit">Update Deal</button>

    </form>

    <br>
    <a href="/dashboard">Cancel</a>

</body>
</html>
